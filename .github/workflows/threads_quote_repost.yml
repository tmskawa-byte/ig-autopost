name: Threads Quote Repost

# Schedule:
#   2x per week run cycle. Target days (JST): 火・金 17:00
#   JST = UTC+9, so 17:00 JST = 08:00 UTC same calendar day.
#     - 火 17:00 JST = 火 08:00 UTC  (cron day 2 = Tue)
#     - 金 17:00 JST = 金 08:00 UTC  (cron day 5 = Fri)
#   GitHub Actions cron is UTC and has no DST in Japan, so this is stable
#   year-round.
on:
  schedule:
    - cron: '0 8 * * 2,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run search + LLM but skip Threads publish (true/false)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      preview_only:
        description: "Search only; print the 3 candidates; skip LLM + publish"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      fresh_hours:
        description: "Freshness window in hours (default 12)"
        required: false
        default: "12"
      min_viral:
        description: "Minimum viral_score required to publish (default 5)"
        required: false
        default: "5"
      min_fit:
        description: "Minimum brand_fit_score required to publish (default 6)"
        required: false
        default: "6"

concurrency:
  group: threads-quote-repost
  cancel-in-progress: false

permissions:
  # state/threads_reposted.json を投稿成功後に自動 commit & push するため。
  contents: write

jobs:
  repost:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run threads_quote_repost
        id: run_repost
        env:
          CHATLLM_API_KEY: ${{ secrets.CHATLLM_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          LOG_LEVEL: INFO
        run: |
          args=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          if [ "${{ github.event.inputs.preview_only }}" = "true" ]; then
            args="$args --preview-only"
          fi
          if [ -n "${{ github.event.inputs.fresh_hours }}" ]; then
            args="$args --fresh-hours ${{ github.event.inputs.fresh_hours }}"
          fi
          if [ -n "${{ github.event.inputs.min_viral }}" ]; then
            args="$args --min-viral ${{ github.event.inputs.min_viral }}"
          fi
          if [ -n "${{ github.event.inputs.min_fit }}" ]; then
            args="$args --min-fit ${{ github.event.inputs.min_fit }}"
          fi
          echo "Running: python scripts/threads_quote_repost.py $args"
          # shellcheck disable=SC2086
          python scripts/threads_quote_repost.py $args

      - name: Commit & push state
        if: >-
          success() &&
          github.event.inputs.dry_run != 'true' &&
          github.event.inputs.preview_only != 'true'
        run: |
          git config user.name "threads-autopost-bot"
          git config user.email "threads-autopost-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git add state/
            git commit -m "chore(state): record threads quote repost [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "State pushed."
          else
            echo "No state changes to commit."
          fi
